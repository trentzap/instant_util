services:
  - type: web
    name: instant-utilities-backend
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: DATABASE_URL
        sync: false # Set manually in Render dashboard to Neon/Supabase connection string
      - key: FRONTEND_URL
        sync: false # Set manually in Render dashboard to Vercel URL
      - key: SECRET_KEY
        generateValue: true
